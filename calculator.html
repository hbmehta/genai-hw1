<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        .calculator {
            background-color: #333;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            width: 280px;
        }

        .display {
            background-color: #1a1a1a;
            color: white;
            text-align: right;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 28px;
            min-height: 60px;
            word-break: break-all;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 18px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.1s;
        }

        button:active {
            opacity: 0.7;
        }

        .btn-number {
            background-color: #555;
            color: white;
        }

        .btn-operator {
            background-color: #f0a500;
            color: white;
        }

        .btn-clear {
            background-color: #ff69b4;
            color: white;
        }

        .btn-equals {
            background-color: #27ae60;
            color: white;
        }

        .btn-span2 {
            grid-column: span 2;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="btn-clear btn-span2" onclick="clearDisplay()">AC</button>
            <button class="btn-operator" onclick="appendToDisplay('%')">%</button>
            <button class="btn-operator" onclick="appendToDisplay('/')">÷</button>

            <button class="btn-number" onclick="appendToDisplay('7')">7</button>
            <button class="btn-number" onclick="appendToDisplay('8')">8</button>
            <button class="btn-number" onclick="appendToDisplay('9')">9</button>
            <button class="btn-operator" onclick="appendToDisplay('*')">×</button>

            <button class="btn-number" onclick="appendToDisplay('4')">4</button>
            <button class="btn-number" onclick="appendToDisplay('5')">5</button>
            <button class="btn-number" onclick="appendToDisplay('6')">6</button>
            <button class="btn-operator" onclick="appendToDisplay('-')">−</button>

            <button class="btn-number" onclick="appendToDisplay('1')">1</button>
            <button class="btn-number" onclick="appendToDisplay('2')">2</button>
            <button class="btn-number" onclick="appendToDisplay('3')">3</button>
            <button class="btn-operator" onclick="appendToDisplay('+')">+</button>

            <button class="btn-number btn-span2" onclick="appendToDisplay('0')">0</button>
            <button class="btn-number" onclick="appendToDisplay('.')">.</button>
            <button class="btn-equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let currentInput = '0';
        let justCalculated = false;

        function updateDisplay(value) {
            display.textContent = value;
        }

        function appendToDisplay(value) {
            if (justCalculated && !isNaN(value)) {
                currentInput = value;
                justCalculated = false;
            } else if (justCalculated) {
                justCalculated = false;
                currentInput += value;
            } else if (currentInput === '0' && value !== '.') {
                currentInput = value;
            } else {
                currentInput += value;
            }
            updateDisplay(currentInput);
        }

        function clearDisplay() {
            currentInput = '0';
            justCalculated = false;
            updateDisplay('0');
        }

        function calculate() {
            try {
                let result = Function('"use strict"; return (' + currentInput + ')')();
                result = parseFloat(result.toFixed(10));
                currentInput = String(result);
                updateDisplay(currentInput);
                justCalculated = true;
            } catch (e) {
                updateDisplay('Error');
                currentInput = '0';
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key >= '0' && e.key <= '9') appendToDisplay(e.key);
            else if (['+', '-', '*', '/', '%', '.'].includes(e.key)) appendToDisplay(e.key);
            else if (e.key === 'Enter' || e.key === '=') calculate();
            else if (e.key === 'Escape') clearDisplay();
            else if (e.key === 'Backspace') {
                currentInput = currentInput.slice(0, -1) || '0';
                updateDisplay(currentInput);
            }
        });
    </script>
</body>
</html>
